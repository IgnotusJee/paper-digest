services:
  mysql:
    image: mysql:8.0
    container_name: paper-digest-mysql
    environment:
      MYSQL_DATABASE: paper_digest
      MYSQL_USER: pd_user
      MYSQL_PASSWORD: pd_pass
      MYSQL_ROOT_PASSWORD: rootpass
    ports:
      - "3306:3306"
    command:
      - --default-authentication-plugin=mysql_native_password
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    environment:
      DATABASE_URL: mysql+asyncmy://pd_user:pd_pass@mysql:3306/paper_digest
      JWT_SECRET: paper-digest-local-jwt-secret
      ADMIN_USERNAME: admin
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: AdminPass123!
      BASE_URL: http://localhost:8000
      MYSQL_NETWORK: paperdigest-local
    depends_on:
      - mysql
    networks:
      - default
      - mysql_net

volumes:
  mysql_data:

networks:
  mysql_net:
    name: paperdigest-local
