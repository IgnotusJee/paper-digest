version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - models_data:/app/models
      - ./frontend/dist:/app/frontend/dist:ro
    networks:
      - mysql_net
    restart: unless-stopped

volumes:
  models_data:

networks:
  mysql_net:
    external: true
    name: ${MYSQL_NETWORK}
